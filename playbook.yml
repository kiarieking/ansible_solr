---
- hosts: all
  become: yes
  remote_user: kkiarie

  vars_files:
    - vars.yml

  # pre_tasks:
  #   - name: Update cache if needed
  #     apt: update_cache=true cache_valid_time=3600

  tasks:
    - name: Install java
      apt: name=default-jre state=present

    # - name: Download Solr 
    #   get_url: 
    #     url: "https://archive.apache.org/dist/lucene/solr/{{ solr_version }}/solr-{{ solr_version }}.tgz"
    #     dest: "{{ download_dir }}/solr-{{ solr_version }}.tgz"
    #     # checksum: "{{ solr_checksum }}"

    - name: Expand Solr
      unarchive:
        src: "{{ download_dir }}/solr-{{ solr_version }}.tgz"
        dest: "{{ download_dir }}"
        remote_src: true
        creates: "{{ download_dir }}/solr-{{ solr_version }}/README.txt"

    - name: Change solr directory ownership
      command: >
        sudo chown -R kkiarie:kkiarie /tmp/solr-8.6.0
  

    - name: Run Solr installation script
      become: yes  
      command: >
        {{ download_dir }}/solr-{{ solr_version }}/solr/bin/install_solr_service.sh

        {{ download_dir }}/solr-{{ solr_version }}.tgz
        -i opt 
        -d /var/solr 
        -u solr 
        -s solr 
        -p 8983
        creates={{ solr_dir }}/bin/solr 

    - name: Ensure solr is started and enabled on boot
      service: name=solr state=started enabled=yes
      