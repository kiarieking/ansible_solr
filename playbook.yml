---
- hosts: all
  become: yes
  remote_user: kkiarie

  vars_files:
    - vars.yml

  # pre_tasks:
  #   - name: Update cache if needed
  #     apt: update_cache=true cache_valid_time=3600

  tasks:
    - name: Install java
      apt: name=default-jre state=present

    # - name: Download Solr 
    #   get_url: 
    #     url: "https://archive.apache.org/dist/lucene/solr/{{ solr_version }}/solr-{{ solr_version }}.tgz"
    #     dest: "{{ download_dir }}/solr-{{ solr_version }}.tgz"
    #     # checksum: "{{ solr_checksum }}"

    - name: Expand Solr
      unarchive:
        src: "{{ download_dir }}/solr-{{ solr_version }}.tgz"
        dest: "{{ download_dir }}"
        remote_src: true
        creates: "{{ download_dir }}/solr-{{ solr_version }}/README.txt"

    - name: Change solr directory ownership
      command: >
        sudo chown -R kkiarie:kkiarie /tmp/solr-8.6.0

    - name: Make solr installation script executable
      command: >
        sudo chmod +x /tmp/solr-8.6.0/solr/bin/install_solr_service.sh

    - name: Move solr to opt
      command: mv /tmp/solr-{{ solr_version }} /opt
      args:
        creates: /opt/solr-{{ solr_version }}
      become: yes

    - name: Create solr symlink
      file:
        src: /opt/solr-{{ solr_version }}
        dest: /opt/solr
        state: link
      become: yes

    - name: Create data directory
      file:
        path: /var/solr
        state: directory
        owner: kkiarie
        group: kkiarie
      become: yes

    - name: Create solr service
      copy: 
        dest: /etc/systemd/system/solr.service
        content: |
          [Unit]
          Description=Apache Solr
          After=network.target

          [Service]
          Type=forking
          User=root

          WorkingDirectory=/opt/solr/solr

          Environment="SOLR_HOME=/var/solr"
          Environment="SOLR_INCLUDE=/opt/solr/solr/bin/solr.in.sh"
          Environment="JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64"

          ExecStart=/bin/bash -c '/opt/solr/solr/bin/solr start'
          ExecStop=/bin/bash -c '/opt/solr/solr/bin/solr stop'

          Restart=on-failure

          [Install]
          WantedBy=multi-user.target 
      become: yes 

    - name: Make solr file executable
      command: >
        sudo chmod +x /opt/solr/solr/bin/solr

    - name: Reload systemd
      command: systemctl daemon-reload
      become: yes

    - name: Start solr
      service:
        name: solr
        state: started
        enabled: yes
      become: yes     


    # - name: Run Solr installation script
    #   become: yes  
    #   command: >

    #     sudo  {{ download_dir }}/solr-{{ solr_version }}/solr/bin/install_solr_service.sh

    #     {{ download_dir }}/solr-{{ solr_version }}.tgz
    #     -i /opt 
    #     -d /var/solr 
    #     -u kkiarie 
    #     -s solr 
    #     -p 8983
    #     creates={{ solr_dir }}/bin/solr 

    - name: Ensure solr is started and enabled on boot
      service: name=solr state=started enabled=yes
      